<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My Health — Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="images/heart.svg">
<link rel="stylesheet" href="style.css">
<style>
/* ---- Admin-only styles (storefront vars/fonts come from style.css) ---- */
body{ background:#eef3ef; }
.admin-wrap{ display:flex; min-height:100vh; }

/* Sidebar */
.side{ width:236px; background:var(--pine); color:#ffe0c4; flex:0 0 auto; display:flex; flex-direction:column;
  position:sticky; top:0; height:100vh; }
.side .brand{ display:flex; align-items:center; gap:10px; padding:20px 18px; font-family:var(--display);
  font-weight:800; font-size:19px; color:#fff; border-bottom:1px solid rgba(255,255,255,.1); }
.side .brand .mark{ width:42px; height:42px; background:url("data:image/svg+xml,%3Csvg%20viewBox%3D%220%200%20100%20100%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2248%22%20fill%3D%22%23ffffff%22%2F%3E%3Cpath%20d%3D%22M50%2076%20C31%2059%2021%2047%2021%2037.5%20C21%2029%2027.5%2023.5%2035%2023.5%20C41%2023.5%2046%2027.5%2050%2033.5%20C54%2027.5%2059%2023.5%2065%2023.5%20C72.5%2023.5%2079%2029%2079%2037.5%20C79%2047%2069%2059%2050%2076%20Z%22%20fill%3D%22%23EA7317%22%2F%3E%3Cpolyline%20points%3D%2227%2C49%2040%2C49%2044%2C40%2050%2C59%2055%2C35%2060%2C49%2073%2C49%22%20fill%3D%22none%22%20stroke%3D%22%23ffffff%22%20stroke-width%3D%224.5%22%20stroke-linejoin%3D%22round%22%20stroke-linecap%3D%22round%22%2F%3E%3C%2Fsvg%3E") center/contain no-repeat; }
.side .brand .mark::after{ content:none; }
.side .brand small{ display:block; font-family:var(--body); font-weight:500; font-size:10px; color:#e8b98a; letter-spacing:.08em; text-transform:uppercase; }

.side .brand .bwm{ display:flex; flex-direction:column; gap:1px; }
.side .brand .bn{ font-family:var(--display); font-weight:800; font-size:20px; line-height:1; color:#fff; }
.side .brand .bn .o, .login .lg .bn .o{ color:var(--leaf); }
.login .lg .bn{ font-family:var(--display); font-weight:800; font-size:23px; }
.side nav{ padding:12px; display:flex; flex-direction:column; gap:3px; flex:1; }
.side nav button{ display:flex; align-items:center; gap:11px; padding:11px 14px; border-radius:10px; color:#ffe0c4;
  font-weight:600; font-size:14px; text-align:left; transition:.15s; }
.side nav button:hover{ background:rgba(255,255,255,.08); color:#fff; }
.side nav button.on{ background:var(--leaf); color:#fff; }
.side nav .ic{ width:20px; text-align:center; font-size:16px; }
.side .logout{ margin:12px; padding:11px 14px; border-radius:10px; background:rgba(255,255,255,.08); color:#fff;
  font-weight:600; font-size:14px; display:flex; align-items:center; gap:10px; justify-content:center; }
.side .logout:hover{ background:var(--rose); }

/* Main */
.main{ flex:1; min-width:0; }
.topbar{ background:#fff; border-bottom:1px solid var(--line); padding:16px 28px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:5; }
.topbar h1{ font-size:22px; }
.topbar .who{ font-size:13px; color:var(--muted); }
.content{ padding:26px 28px; max-width:1100px; }

/* Stat cards */
.stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:26px; }
.stat{ background:#fff; border:1px solid var(--line); border-radius:var(--r); padding:18px 20px; }
.stat .lbl{ font-size:13px; color:var(--muted); font-weight:600; }
.stat .val{ font-family:var(--display); font-weight:800; font-size:28px; margin-top:6px; }
.stat .ic{ float:right; font-size:26px; opacity:.85; }
.stat.green .val{ color:var(--leaf); } .stat.amber .val{ color:var(--amber); } .stat.rose .val{ color:var(--rose); }

/* Section card */
.panel{ background:#fff; border:1px solid var(--line); border-radius:var(--r); padding:0; overflow:hidden; margin-bottom:22px; }
.panel-head{ padding:16px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.panel-head h2{ font-size:17px; }
.panel-tools{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.panel-tools input, .panel-tools select{ height:38px; border:1.5px solid var(--line); border-radius:9px; padding:0 12px; font-size:14px; font-family:inherit; }

/* Buttons */
.b{ height:38px; padding:0 16px; border-radius:9px; font-weight:700; font-size:14px; display:inline-flex; align-items:center; gap:7px; }
.b-green{ background:var(--leaf); color:#fff; } .b-green:hover{ background:var(--leaf-d); }
.b-ghost{ background:#fff; border:1.5px solid var(--line); color:var(--ink); } .b-ghost:hover{ border-color:var(--leaf); color:var(--leaf); }
.b-rose{ background:#fff; border:1.5px solid #f3c6cf; color:var(--rose); } .b-rose:hover{ background:var(--rose); color:#fff; }
.b-sm{ height:32px; padding:0 11px; font-size:13px; border-radius:8px; }

/* Table */
table{ width:100%; border-collapse:collapse; font-size:14px; }
th{ text-align:left; padding:12px 16px; background:#f6f9f5; color:var(--muted); font-weight:700; font-size:12px;
  text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--line); }
td{ padding:12px 16px; border-bottom:1px solid var(--line); vertical-align:middle; }
tr:last-child td{ border-bottom:none; }
.t-img{ width:42px; height:42px; border-radius:9px; object-fit:cover; background:#f5ece2; }
.t-emoji{ width:42px; height:42px; border-radius:9px; background:#f5ece2; display:grid; place-items:center; font-size:22px; }
.pill{ display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; }
.pill.goal{ background:#fdeede; color:var(--leaf-d); }
.tag-mini{ font-size:11px; color:var(--muted); }
.row-acts{ display:flex; gap:6px; }

/* status select */
.status{ border:1.5px solid var(--line); border-radius:8px; padding:5px 8px; font-size:13px; font-weight:600; font-family:inherit; }
.status[data-s="pending"]{ color:var(--amber); border-color:#f6dcae; background:#fff8ee; }
.status[data-s="confirmed"]{ color:#2563EB; border-color:#c5d8fb; background:#eff5ff; }
.status[data-s="delivered"]{ color:var(--leaf-d); border-color:#f5d0b0; background:#fff1e6; }
.status[data-s="cancelled"]{ color:var(--rose); border-color:#f3c6cf; background:#fff5f6; }

.empty{ text-align:center; padding:50px 20px; color:var(--muted); }
.empty .e{ font-size:46px; margin-bottom:8px; }

/* Modal */
.modal-bg{ position:fixed; inset:0; background:rgba(74,34,8,.55); display:none; align-items:flex-start; justify-content:center;
  padding:40px 16px; z-index:50; overflow-y:auto; }
.modal-bg.open{ display:flex; }
.modal{ background:#fff; border-radius:var(--r-lg); width:100%; max-width:600px; }
.modal-head{ padding:18px 22px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
.modal-head h3{ font-size:19px; } .modal-head button{ font-size:26px; color:var(--muted); line-height:1; }
.modal-body{ padding:20px 22px; }
.modal-foot{ padding:16px 22px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-end; }
.fld{ margin-bottom:14px; } .fld label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
.fld input, .fld select, .fld textarea{ width:100%; border:1.5px solid var(--line); border-radius:10px; padding:10px 12px;
  font-size:14px; font-family:inherit; outline:none; }
.fld input:focus, .fld select:focus, .fld textarea:focus{ border-color:var(--leaf); }
.fld textarea{ resize:vertical; min-height:64px; }
.g2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; } .g3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }

/* order details */
.od-row{ display:flex; justify-content:space-between; font-size:14px; padding:5px 0; }
.od-items{ border:1px solid var(--line); border-radius:10px; margin:10px 0; }
.od-items .it{ display:flex; justify-content:space-between; padding:9px 12px; border-bottom:1px solid var(--line); font-size:14px; }
.od-items .it:last-child{ border-bottom:none; }
.note-box{ background:#fff8ee; border:1px solid #f6dcae; border-radius:10px; padding:12px 14px; font-size:13px; color:#8a6d2f; margin-top:14px; }

/* Login */
.login-bg{ min-height:100vh; display:grid; place-items:center; background:
  radial-gradient(120% 120% at 100% 0%, rgba(255,195,104,.25), transparent 55%), linear-gradient(145deg,var(--pine),#5e2b08); padding:20px; }
.login{ background:#fff; border-radius:var(--r-lg); padding:34px 30px; width:100%; max-width:380px; box-shadow:var(--shadow-h); }
.login .lg{ display:flex; align-items:center; gap:10px; font-family:var(--display); font-weight:800; font-size:22px; color:var(--pine); margin-bottom:6px; }
.login .lg .mark{ width:48px; height:48px; background:url("data:image/svg+xml,%3Csvg%20viewBox%3D%220%200%20100%20100%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2248%22%20fill%3D%22%23ffffff%22%2F%3E%3Cpath%20d%3D%22M50%2076%20C31%2059%2021%2047%2021%2037.5%20C21%2029%2027.5%2023.5%2035%2023.5%20C41%2023.5%2046%2027.5%2050%2033.5%20C54%2027.5%2059%2023.5%2065%2023.5%20C72.5%2023.5%2079%2029%2079%2037.5%20C79%2047%2069%2059%2050%2076%20Z%22%20fill%3D%22%23EA7317%22%2F%3E%3Cpolyline%20points%3D%2227%2C49%2040%2C49%2044%2C40%2050%2C59%2055%2C35%2060%2C49%2073%2C49%22%20fill%3D%22none%22%20stroke%3D%22%23ffffff%22%20stroke-width%3D%224.5%22%20stroke-linejoin%3D%22round%22%20stroke-linecap%3D%22round%22%2F%3E%3C%2Fsvg%3E") center/contain no-repeat; }
.login .lg .mark::after{ content:none; }
.login p{ color:var(--muted); font-size:14px; margin:0 0 22px; }
.login label{ font-size:13px; font-weight:600; display:block; margin-bottom:6px; }
.login input{ width:100%; height:48px; border:1.5px solid var(--line); border-radius:12px; padding:0 16px; font-size:15px; outline:none; }
.login input:focus{ border-color:var(--leaf); }
.login .b-green{ width:100%; height:50px; margin-top:16px; font-size:16px; border-radius:12px; }
.login .err{ color:var(--rose); font-size:13px; margin-top:10px; min-height:18px; }
.login .hint{ font-size:12px; color:var(--muted); margin-top:14px; text-align:center; }

@media (max-width:820px){
  .stats{ grid-template-columns:repeat(2,1fr); }
  .side{ width:64px; }
  .side .brand span, .side nav button span, .side .logout span{ display:none; }
  .side .brand{ justify-content:center; padding:18px 0; } .side nav button{ justify-content:center; }
  .g2,.g3{ grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div class="login-bg" id="loginScreen">
  <div class="login">
    <div class="lg"><span class="mark"></span><span class="bn"><span class="o">My</span> Health</span></div>
    <p>Admin Panel — sign in to manage products &amp; orders.</p>
    <label>Email</label>
    <input id="loginEmail" type="email" placeholder="admin email" value="mijanu443@gmail.com" />
    <label style="margin-top:12px">Password</label>
    <input id="loginPass" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="b b-green" onclick="doLogin()">Sign in</button>
    <div class="err" id="loginErr"></div>
    <div class="hint">Firebase Auth diye login · password tomar Firebase account er</div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div class="admin-wrap" id="adminApp" style="display:none">
  <aside class="side">
    <div class="brand"><span class="mark"></span><span class="bwm"><span class="bn"><span class="o">My</span> Health</span><small>Admin</small></span></div>
    <nav>
      <button class="on" data-tab="dashboard" onclick="go('dashboard')"><span class="ic">📊</span><span>Dashboard</span></button>
      <button data-tab="products" onclick="go('products')"><span class="ic">📦</span><span>Products</span></button>
      <button data-tab="orders" onclick="go('orders')"><span class="ic">🧾</span><span>Orders</span></button>
      <button data-tab="settings" onclick="go('settings')"><span class="ic">⚙️</span><span>Settings</span></button>
    </nav>
    <a class="logout" href="index.html" target="_blank"><span class="ic">🛍️</span><span>View store</span></a>
    <button class="logout" onclick="logout()"><span class="ic">⏏️</span><span>Logout</span></button>
  </aside>

  <main class="main">
    <div class="topbar"><h1 id="pageTitle">Dashboard</h1><div class="who">👤 <span id="adminEmail">Admin</span></div></div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- ===================== MODAL ===================== -->
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="product.js"></script>
<script>
/* ============================ FIREBASE AUTH ============================ */
const ADMIN = { productsKey:'products', ordersKey:'orders' };
const GOALS = [
  {id:"immunity",label:"Immunity",emoji:"🛡️"},{id:"energy",label:"Energy",emoji:"⚡"},
  {id:"muscle",label:"Muscle",emoji:"💪"},{id:"brain",label:"Brain",emoji:"🧠"},
  {id:"sleep",label:"Sleep",emoji:"🌙"},{id:"bones",label:"Bones",emoji:"🦴"},
  {id:"weight",label:"Weight",emoji:"⚖️"},{id:"skin",label:"Skin & Hair",emoji:"✨"},
];
const TAGS = ["flash","best","new"];

const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => '৳' + Number(n||0).toLocaleString('en-IN');
const goalLabel = id => (GOALS.find(g=>g.id===id)||{}).label || id;

let products = [];
let orders = [];
let curTab = 'dashboard';
let seeded = false;

function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginErr');
  if(!window.fauth){ err.textContent = 'Firebase load hoyni — internet check koro.'; return; }
  err.textContent = 'Signing in…';
  window.fauth.signInWithEmailAndPassword(email, pass)
    .catch(e=>{ err.textContent = ({
      'auth/invalid-credential':'Email ba password thik na.',
      'auth/wrong-password':'Password thik na.',
      'auth/user-not-found':'Ei email e kono user nai.',
      'auth/invalid-email':'Email format thik na.',
    })[e.code] || e.message; });
}
function logout(){ if(window.fauth) window.fauth.signOut(); }

/* gate: only the admin email gets in */
if(window.fauth){
  window.fauth.onAuthStateChanged(user=>{
    if(user && user.email === window.ADMIN_EMAIL){ startApp(); }
    else if(user){ window.fauth.signOut(); document.getElementById('loginErr').textContent='Ei account admin na.'; }
    else { showLogin(); }
  });
} else {
  document.getElementById('loginErr').textContent = 'Firebase load hoyni. Internet/host check koro.';
}

function showLogin(){
  document.getElementById('adminApp').style.display='none';
  document.getElementById('loginScreen').style.display='grid';
}
function startApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminApp').style.display='flex';
  document.getElementById('adminEmail') && (document.getElementById('adminEmail').textContent = window.ADMIN_EMAIL);
  attachListeners();
  go('dashboard');
}

/* ============================ FIREBASE DATA (realtime) ============================ */
function attachListeners(){
  window.fdb.ref(ADMIN.productsKey).on('value', snap=>{
    const val = snap.val();
    products = val ? Object.values(val).filter(Boolean) : [];
    products.sort((a,b)=>(b.id||0)-(a.id||0));
    // first-time seed from product.js if Firebase khali
    if(!products.length && !seeded && typeof PRODUCTS!=='undefined' && PRODUCTS.length){
      seeded = true; seedProducts();
      return;
    }
    if(['dashboard','products'].includes(curTab)) renderCurrent();
  });
  window.fdb.ref(ADMIN.ordersKey).on('value', snap=>{
    const val = snap.val();
    orders = val ? Object.entries(val).map(([k,v])=>({_key:k, ...v})) : [];
    orders.sort((a,b)=> new Date(b.placedAt||0) - new Date(a.placedAt||0));
    if(['dashboard','orders'].includes(curTab)) renderCurrent();
  });
}
function seedProducts(){
  const obj = {};
  PRODUCTS.forEach(p=>{ obj[p.id] = p; });
  window.fdb.ref(ADMIN.productsKey).set(obj)
    .then(()=>console.log('Seeded', PRODUCTS.length, 'products to Firebase'))
    .catch(e=>alert('Seed failed: '+e.message));
}
function renderCurrent(){ ({dashboard:renderDashboard,products:renderProducts,orders:renderOrders,settings:renderSettings}[curTab]||renderDashboard)(); }

function thumb(p){
  return p.img ? `<img class="t-img" src="${esc(p.img)}" alt="" onerror="this.outerHTML='<div class=\\'t-emoji\\'>${p.emoji||'💊'}</div>'">`
               : `<div class="t-emoji">${p.emoji||'💊'}</div>`;
}
function fmtDate(iso){ try{ const d=new Date(iso); return d.toLocaleDateString()+' '+d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }catch(e){ return '-'; } }

/* ============================ ROUTER ============================ */
function go(tab){
  curTab = tab;
  document.querySelectorAll('.side nav button').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  document.getElementById('pageTitle').textContent = ({dashboard:'Dashboard',products:'Products',orders:'Orders',settings:'Settings'})[tab];
  renderCurrent();
}

/* ============================ DASHBOARD ============================ */
function renderDashboard(){
  const pending = orders.filter(o=>o.status==='pending').length;
  const revenue = orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+(o.total||0),0);
  const recent = orders.slice(0,6);
  document.getElementById('content').innerHTML = `
    <div class="stats">
      <div class="stat green"><span class="ic">📦</span><div class="lbl">Products</div><div class="val">${products.length}</div></div>
      <div class="stat"><span class="ic">🧾</span><div class="lbl">Total Orders</div><div class="val">${orders.length}</div></div>
      <div class="stat amber"><span class="ic">⏳</span><div class="lbl">Pending</div><div class="val">${pending}</div></div>
      <div class="stat green"><span class="ic">💰</span><div class="lbl">Revenue</div><div class="val">${money(revenue)}</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h2>Recent Orders</h2><button class="b b-ghost b-sm" onclick="go('orders')">View all →</button></div>
      ${recent.length ? `<table><thead><tr><th>Order</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr></thead><tbody>
        ${recent.map(o=>`<tr>
          <td><b>${esc(o.id)}</b></td>
          <td>${esc(o.customer?.name||'-')}<div class="tag-mini">${esc(o.customer?.phone||'')}</div></td>
          <td><b>${money(o.total)}</b></td>
          <td><span class="pill" style="background:#f5ece2">${esc(o.status||'pending')}</span></td>
          <td class="tag-mini">${fmtDate(o.placedAt)}</td>
        </tr>`).join('')}
      </tbody></table>` : `<div class="empty"><div class="e">🧾</div>No orders yet. Checkout theke order asle ekhane dekhabe.</div>`}
    </div>`;
}

/* ============================ PRODUCTS ============================ */
let prodSearch = '';
function renderProducts(){
  const list = products.filter(p => !prodSearch || (p.name||'').toLowerCase().includes(prodSearch) || goalLabel(p.goal).toLowerCase().includes(prodSearch));
  document.getElementById('content').innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <h2>Products (${products.length})</h2>
        <div class="panel-tools">
          <input placeholder="Search products…" value="${esc(prodSearch)}" oninput="prodSearch=this.value.toLowerCase();renderProducts()">
          <button class="b b-ghost b-sm" onclick="exportProducts()">⬇️ Backup .js</button>
          <button class="b b-green b-sm" onclick="openProduct()">＋ Add Product</button>
        </div>
      </div>
      ${list.length ? `<table><thead><tr><th>Product</th><th>Goal</th><th>Price</th><th>Tags</th><th></th></tr></thead><tbody>
        ${list.map(p=>`<tr>
          <td><div style="display:flex;gap:11px;align-items:center">${thumb(p)}<div><b>${esc(p.name)}</b><div class="tag-mini">${esc(p.brand||'')} ${p.size?'· '+esc(p.size):''}</div></div></div></td>
          <td><span class="pill goal">${esc(goalLabel(p.goal))}</span></td>
          <td><b>${money(p.price)}</b>${p.oldPrice>p.price?`<div class="tag-mini" style="text-decoration:line-through">${money(p.oldPrice)}</div>`:''}</td>
          <td class="tag-mini">${(p.tags||[]).join(', ')||'—'}</td>
          <td><div class="row-acts">
            <button class="b b-ghost b-sm" onclick="openProduct(${p.id})">Edit</button>
            <button class="b b-rose b-sm" onclick="delProduct(${p.id})">Delete</button>
          </div></td>
        </tr>`).join('')}
      </tbody></table>` : `<div class="empty"><div class="e">📦</div>No products. "Add Product" diye suru koro.</div>`}
    </div>
    <div class="note-box">☁️ <b>Live:</b> ekhane add/edit/delete korle shoja <b>Firebase</b> e save hoy — website e (sob device) sathe sathe update hobe. Commit/export lagbe na.</div>`;
}

function openProduct(id){
  const p = id!=null ? products.find(x=>x.id===id) : null;
  const isEdit = !!p;
  const g = (sel)=> GOALS.map(x=>`<option value="${x.id}" ${sel===x.id?'selected':''}>${x.emoji} ${x.label}</option>`).join('');
  const tagChecks = TAGS.map(t=>`<label style="display:inline-flex;gap:5px;align-items:center;font-weight:500;margin-right:14px">
     <input type="checkbox" id="pt_${t}" ${p&&(p.tags||[]).includes(t)?'checked':''}> ${t}</label>`).join('');
  document.getElementById('modal').innerHTML = `
    <div class="modal-head"><h3>${isEdit?'Edit':'Add'} Product</h3><button onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="fld"><label>Product name *</label><input id="p_name" value="${esc(p?.name||'')}" placeholder="e.g. Whey Protein Isolate 2kg"></div>
      <div class="g2">
        <div class="fld"><label>Goal *</label><select id="p_goal">${g(p?.goal||'immunity')}</select></div>
        <div class="fld"><label>Brand</label><input id="p_brand" value="${esc(p?.brand||'')}" placeholder="e.g. NutriPro"></div>
      </div>
      <div class="g3">
        <div class="fld"><label>Price (৳) *</label><input id="p_price" type="number" value="${p?.price||''}"></div>
        <div class="fld"><label>Old price (৳)</label><input id="p_old" type="number" value="${p?.oldPrice||''}"></div>
        <div class="fld"><label>Emoji</label><input id="p_emoji" value="${esc(p?.emoji||'💊')}" maxlength="4"></div>
      </div>
      <div class="fld"><label>Image URL</label><input id="p_img" value="${esc(p?.img||'')}" placeholder="images/whey.jpg or https://…"></div>
      <div class="g3">
        <div class="fld"><label>Timing</label><select id="p_timing">
          ${['morning','postworkout','night','anytime'].map(t=>`<option value="${t}" ${p?.timing===t?'selected':''}>${t}</option>`).join('')}
        </select></div>
        <div class="fld"><label>Rating</label><input id="p_rating" type="number" step="0.1" min="0" max="5" value="${p?.rating||4.7}"></div>
        <div class="fld"><label>Reviews</label><input id="p_reviews" type="number" value="${p?.reviews||0}"></div>
      </div>
      <div class="fld"><label>Size / pack</label><input id="p_size" value="${esc(p?.size||'')}" placeholder="e.g. 60 capsules"></div>
      <div class="fld"><label>Description</label><textarea id="p_desc" placeholder="Short product description…">${esc(p?.desc||'')}</textarea></div>
      <div class="fld"><label>Benefits (one per line)</label><textarea id="p_benefits" placeholder="Boosts immunity">${esc((p?.benefits||[]).join('\n'))}</textarea></div>
      <div class="fld"><label>Tags</label><div>${tagChecks}</div></div>
    </div>
    <div class="modal-foot">
      <button class="b b-ghost" onclick="closeModal()">Cancel</button>
      <button class="b b-green" onclick="saveProduct(${isEdit?p.id:'null'})">${isEdit?'Save changes':'Add product'}</button>
    </div>`;
  openModal();
}
function saveProduct(id){
  const v = i => document.getElementById(i).value.trim();
  const name = v('p_name'), price = parseInt(v('p_price'),10);
  if(!name || !price){ alert('Name ar Price দিতে হবে।'); return; }
  const existing = id!=null ? products.find(x=>x.id===id) : null;
  const newId = id!=null ? id : (products.reduce((m,p)=>Math.max(m,p.id||0),0)+1);
  const data = {
    id: newId, name, goal: v('p_goal'), brand: v('p_brand'),
    price, oldPrice: parseInt(v('p_old'),10) || price,
    emoji: v('p_emoji') || '💊', img: v('p_img'),
    timing: v('p_timing'), rating: parseFloat(v('p_rating'))||4.7, reviews: parseInt(v('p_reviews'),10)||0,
    size: v('p_size'), desc: v('p_desc'),
    benefits: v('p_benefits').split('\n').map(s=>s.trim()).filter(Boolean),
    tags: TAGS.filter(t=>document.getElementById('pt_'+t).checked),
    use: (existing && existing.use) || {dose:'', when:'', duration:''}
  };
  window.fdb.ref(ADMIN.productsKey+'/'+newId).set(data)
    .then(()=>{ closeModal(); })
    .catch(e=>alert('Save failed: '+e.message));
}
function delProduct(id){
  const p = products.find(x=>x.id===id);
  if(!confirm(`Delete "${p?.name}"?`)) return;
  window.fdb.ref(ADMIN.productsKey+'/'+id).remove().catch(e=>alert('Delete failed: '+e.message));
}

/* ============================ ORDERS ============================ */
let orderFilter = 'all';
function renderOrders(){
  const list = orderFilter==='all' ? orders : orders.filter(o=>o.status===orderFilter);
  document.getElementById('content').innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <h2>Orders (${orders.length})</h2>
        <div class="panel-tools">
          <select onchange="orderFilter=this.value;renderOrders()">
            <option value="all">All statuses</option>
            <option value="pending" ${orderFilter==='pending'?'selected':''}>Pending</option>
            <option value="confirmed" ${orderFilter==='confirmed'?'selected':''}>Confirmed</option>
            <option value="delivered" ${orderFilter==='delivered'?'selected':''}>Delivered</option>
            <option value="cancelled" ${orderFilter==='cancelled'?'selected':''}>Cancelled</option>
          </select>
          <button class="b b-ghost b-sm" onclick="exportOrders()">⬇️ Export CSV</button>
        </div>
      </div>
      ${list.length ? `<table><thead><tr><th>Order</th><th>Customer</th><th>Items</th><th>Total</th><th>Pay</th><th>Status</th><th></th></tr></thead><tbody>
        ${list.map(o=>`<tr>
          <td><b>${esc(o.id)}</b><div class="tag-mini">${fmtDate(o.placedAt)}</div></td>
          <td>${esc(o.customer?.name||'-')}<div class="tag-mini">${esc(o.customer?.phone||'')}</div></td>
          <td>${(o.items||[]).reduce((s,i)=>s+i.qty,0)} items</td>
          <td><b>${money(o.total)}</b></td>
          <td class="tag-mini">${esc((o.payment||'').toUpperCase())}</td>
          <td><select class="status" data-s="${esc(o.status||'pending')}" onchange="setStatus('${esc(o._key)}',this.value)">
            ${['pending','confirmed','delivered','cancelled'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`).join('')}
          </select></td>
          <td><div class="row-acts">
            <button class="b b-ghost b-sm" onclick="viewOrder('${esc(o._key)}')">View</button>
            <button class="b b-rose b-sm" onclick="delOrder('${esc(o._key)}')">✕</button>
          </div></td>
        </tr>`).join('')}
      </tbody></table>` : `<div class="empty"><div class="e">🧾</div>No orders ${orderFilter!=='all'?'with status "'+orderFilter+'"':'yet'}.</div>`}
    </div>`;
}
function setStatus(key, status){ window.fdb.ref(ADMIN.ordersKey+'/'+key+'/status').set(status).catch(e=>alert(e.message)); }
function delOrder(key){ if(confirm('Delete this order?')) window.fdb.ref(ADMIN.ordersKey+'/'+key).remove().catch(e=>alert(e.message)); }
function viewOrder(key){
  const o = orders.find(x=>x._key===key); if(!o) return;
  const c = o.customer||{};
  document.getElementById('modal').innerHTML = `
    <div class="modal-head"><h3>Order ${esc(o.id)}</h3><button onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="od-row"><span style="color:var(--muted)">Date</span><b>${fmtDate(o.placedAt)}</b></div>
      <div class="od-row"><span style="color:var(--muted)">Status</span><b>${esc(o.status)}</b></div>
      <h3 style="font-size:15px;margin:16px 0 6px">Customer</h3>
      <div class="od-row"><span style="color:var(--muted)">Name</span><b>${esc(c.name)}</b></div>
      <div class="od-row"><span style="color:var(--muted)">Phone</span><b>${esc(c.phone)}</b></div>
      ${c.email?`<div class="od-row"><span style="color:var(--muted)">Email</span><b>${esc(c.email)}</b></div>`:''}
      <div class="od-row"><span style="color:var(--muted)">Address</span><b style="text-align:right;max-width:60%">${esc(c.address)}, ${esc(c.district)}, ${esc(c.division)}</b></div>
      ${c.note?`<div class="od-row"><span style="color:var(--muted)">Note</span><b>${esc(c.note)}</b></div>`:''}
      <h3 style="font-size:15px;margin:16px 0 6px">Items</h3>
      <div class="od-items">${(o.items||[]).map(i=>`<div class="it"><span>${esc(i.name)} × ${i.qty}</span><b>${money(i.price*i.qty)}</b></div>`).join('')}</div>
      <div class="od-row"><span style="color:var(--muted)">Subtotal</span><span>${money(o.subtotal)}</span></div>
      ${o.discount?`<div class="od-row"><span style="color:var(--muted)">Discount ${o.coupon?'('+esc(o.coupon)+')':''}</span><span>-${money(o.discount)}</span></div>`:''}
      <div class="od-row"><span style="color:var(--muted)">Delivery</span><span>${o.delivery?money(o.delivery):'FREE'}</span></div>
      <div class="od-row" style="font-size:18px;font-weight:800;font-family:var(--display);border-top:1px solid var(--line);padding-top:10px;margin-top:6px"><span>Total</span><span>${money(o.total)}</span></div>
      <div class="od-row"><span style="color:var(--muted)">Payment</span><b>${esc((o.payment||'').toUpperCase())}</b></div>
    </div>
    <div class="modal-foot">
      <button class="b b-ghost" onclick="window.print()">🖨️ Print</button>
      <button class="b b-green" onclick="closeModal()">Close</button>
    </div>`;
  openModal();
}

/* ============================ EXPORTS ============================ */
function download(name, text, type){
  const blob = new Blob([text], {type:type||'text/plain'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
function exportProducts(){
  const header = `/* MY HEALTH — product.js backup (admin theke export) */\n\n`;
  download('product.js', header + 'const PRODUCTS = ' + JSON.stringify(products, null, 2) + ';\n', 'text/javascript');
}
function exportOrders(){
  const head = ['Order ID','Date','Name','Phone','Division','District','Address','Items','Subtotal','Discount','Delivery','Total','Payment','Status'];
  const rows = orders.map(o=>{
    const c=o.customer||{};
    const items=(o.items||[]).map(i=>`${i.name} x${i.qty}`).join(' | ');
    return [o.id, o.placedAt, c.name, c.phone, c.division, c.district, c.address, items, o.subtotal, o.discount, o.delivery, o.total, o.payment, o.status]
      .map(v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`).join(',');
  });
  download('myhealth-orders.csv', [head.join(','), ...rows].join('\n'), 'text/csv');
}

/* ============================ MODAL ============================ */
function openModal(){ document.getElementById('modalBg').classList.add('open'); }
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click', e=>{ if(e.target.id==='modalBg') closeModal(); });
</script>
